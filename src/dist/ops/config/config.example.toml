# default_target:
# - 留空时，运行时必须依赖 Issue body 中的 target_repo: owner/repo
# - 仅在存在多个 [[targets]] 时建议显式指定默认值
default_target = ""

# GitHub 控制面配置。
# control_repo 固定指向官方控制仓库，不接受运行时自定义。
[github]
control_repo = "41490/ccclaw"
issue_label = "ccclaw"
# ingest 每轮会在 control_repo 与所有启用 target repo 中分别拉取 open issues。
# - 只统计匹配 issue_label 的 Issue
# - 不是并发数，也不是 run 阶段的执行上限
limit = 20

# 固定路径边界：
# - app_dir: 程序树
# - home_repo: 知识仓库
# - kb_dir: 默认知识库目录
# - env_file: 所有敏感信息唯一入口
[paths]
app_dir = "~/.ccclaw"
home_repo = "/opt/ccclaw"
state_db = "~/.ccclaw/var/state.db"
log_dir = "~/.ccclaw/log"
kb_dir = "/opt/ccclaw/kb"
env_file = "~/.ccclaw/.env"

# 执行器默认走 ccclaude 包装器，优先复用 rtk proxy，其次直连 claude。
[executor]
provider = "claude-code"
command = ["~/.ccclaw/bin/ccclaude"]
timeout = "30m"

# 调度策略配置：
# - mode: 安装时请求的调度模式
# - systemd_user_dir: user systemd 单元写入目录
# - calendar_timezone: systemd timer 周期解释时区；默认按北京时间 Asia/Shanghai
[scheduler]
mode = "none"
systemd_user_dir = "~/.config/systemd/user"
calendar_timezone = "Asia/Shanghai"

# systemd timer 周期，采用 systemd OnCalendar 语法。
# - `*-*-* 23:50:00` 表示“每年-每月-每日 23:50:00”
# - 若要配置凌晨 01:01:42，可写为 `*-*-* 01:01:42`
# - 若表达式未显式带时区，运行时会自动追加 scheduler.calendar_timezone
[scheduler.timers]
ingest = "*:0/5"
run = "*:0/10"
patrol = "*:0/2"
journal = "*-*-* 23:50:00"

# 调度日志级别：
# - level: 运行态 `ingest/run/patrol/journal` 共享的日志阈值，同时也是 `ccclaw scheduler logs` 默认过滤
# - 运行态统一归一为 debug|info|warning|error；兼容历史别名 emerg|alert|crit|err|notice
# - `error` 在 journalctl 查询时会自动映射为 `err`
# - archive_dir: `ccclaw scheduler logs --archive` 默认归档目录
[scheduler.logs]
level = "info"
archive_dir = "~/.ccclaw/log/scheduler"

# maintain 及以上权限的 Issue 自动执行；其他情况需要受信任成员评论 /ccclaw + 同义词。
# 若 issue_label 被移除，任务会转为 BLOCKED，待重新打标签后再恢复。
[approval]
minimum_permission = "maintain"
words = ["approve", "go", "confirm", "批准", "agree", "同意", "推进", "通过", "ok"]
reject_words = ["reject", "no", "cancel", "nil", "null", "拒绝", "000"]

# 任务仓库样例：
# [[targets]]
# repo = "owner/repo"
# local_path = "/opt/src/3claw/owner/repo"
# kb_path = "/opt/ccclaw/kb"
# disabled = false
