# default_target:
# - 留空时，运行时必须依赖 Issue body 中的 target_repo: owner/repo
# - 仅在存在多个 [[targets]] 时建议显式指定默认值
default_target = ""

# GitHub 控制面配置。
# control_repo 用于收 Issue、评论审批和权限判定，不等于实际干活的代码仓库。
[github]
control_repo = "41490/ccclaw"
issue_label = "ccclaw"
limit = 20

# 固定路径边界：
# - app_dir: 程序树
# - home_repo: 本体记忆仓库
# - kb_dir: 默认知识库目录
# - env_file: 所有敏感信息唯一入口
[paths]
app_dir = "~/.ccclaw"
home_repo = "/opt/ccclaw"
state_db = "~/.ccclaw/var/state.db"
log_dir = "~/.ccclaw/log"
kb_dir = "/opt/ccclaw/kb"
env_file = "~/.ccclaw/.env"

# 执行器默认走 ccclaude 包装器，优先复用 rtk proxy，其次直连 claude。
[executor]
provider = "claude-code"
command = ["~/.ccclaw/bin/ccclaude"]
timeout = "30m"

# 调度策略配置：
# - mode: 安装时请求的调度模式
# - systemd_user_dir: user systemd 单元写入目录
[scheduler]
mode = "none"
systemd_user_dir = "~/.config/systemd/user"

# maintain 及以上权限的 Issue 自动执行；其他情况需要受信任成员评论 /ccclaw + 同义词。
[approval]
minimum_permission = "maintain"
words = ["approve", "go", "confirm", "批准", "agree", "同意", "推进", "通过", "ok"]
reject_words = ["reject", "no", "cancel", "nil", "null", "拒绝", "000"]

# 任务仓库样例：
# [[targets]]
# repo = "owner/repo"
# local_path = "/opt/src/3claw/owner/repo"
# kb_path = "/opt/ccclaw/kb"
# disabled = false
